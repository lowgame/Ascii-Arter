<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Arter</title>
  <meta name="description" content="Pure JavaScript ASCII art animation creator." />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css?v=reboot-1" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">ASCII Arter</div>
      <div class="top-actions">
        <button id="jsonTestBtn" class="btn">JSON Test</button>
        <button id="randomizeBtn" class="btn btn-accent">Randomize</button>
        <button id="presetsGalleryBtn" class="btn">Presets</button>

        <div class="export-group">
          <button class="btn" id="exportMenuBtn">Export</button>
          <div class="dropdown" id="exportDropdown">
            <button id="exportProjectBtn">Export JSON</button>
            <button id="exportPngBtn">Export PNG</button>
            <button id="importBtn">Import JSON</button>
            <button id="copyFrameBtn" hidden>Copy Frame</button>
            <button id="exportTxtBtn" hidden>Export TXT</button>
            <button id="exportHtmlBtn" hidden>Export HTML</button>
            <button id="embedCodeBtn" hidden>Open JSON Test / Embed</button>
          </div>
        </div>
      </div>

      <input id="importProjectInput" type="file" accept="application/json" hidden />

      <select id="presetSelect" hidden></select>
      <button id="savePresetBtn" hidden>Save</button>
      <button id="playPauseBtn" hidden>Pause</button>
      <button id="shuffleCharsetBtn" hidden>Charset</button>
    </header>

    <section id="subjectTextArea" class="input-card">
      <label for="subjectTextInput">Main Text</label>
      <textarea id="subjectTextInput" rows="4" spellcheck="false" placeholder="Write text"></textarea>
      <div class="input-row">
        <button id="subjectClearBtn" class="btn">Clear</button>
        <button class="subject-tab" data-type="text" id="activateTextBtn" hidden>Use Text</button>
        <select id="subjectFontWeight" hidden>
          <option value="bold">Bold</option>
          <option value="900">Extra Bold</option>
          <option value="normal">Normal</option>
        </select>
        <input type="range" id="subjectBgIntensity" min="0" max="0.5" step="0.01" value="0.08" hidden />
        <input type="range" id="subjectPadding" min="0" max="12" step="1" value="4" hidden />
      </div>
    </section>

    <main class="stage-card">
      <canvas id="bgCanvas" aria-hidden="true"></canvas>
      <div class="canvas-wrap">
        <canvas id="stageCanvas" aria-label="ASCII preview canvas"></canvas>
      </div>
    </main>

    <footer class="simple-status">
      <span id="projectTitleLabelInline">ASCII Arter</span>
      <span id="statusStatInline">Ready</span>
    </footer>
  </div>

  <section id="subjectSvgArea" hidden>
    <textarea id="subjectSvgInput" rows="3" spellcheck="false" placeholder="Paste <svg>...</svg>"></textarea>
    <button id="subjectSvgUpload">Upload SVG</button>
    <input id="subjectSvgFileInput" type="file" accept=".svg,image/svg+xml" hidden />
    <button class="subject-tab" data-type="svg" id="activateSvgBtn">Use SVG</button>
  </section>

  <section id="subjectOptions" hidden></section>

  <div class="infra" hidden>
    <div id="controlsContent"></div>

    <button id="addLayerBtn"></button>
    <button id="removeLayerBtn"></button>
    <button id="duplicateLayerBtn"></button>
    <button id="moveLayerUpBtn"></button>
    <button id="moveLayerDownBtn"></button>

    <button id="addTextBtn"></button>
    <button id="removeTextBtn"></button>
    <button id="duplicateTextBtn"></button>

    <button id="addSvgLayerBtn"></button>
    <button id="removeSvgLayerBtn"></button>
    <input id="svgUploadInput" type="file" accept=".svg,image/svg+xml" />

    <div id="layersList"></div>
    <div id="layerInspector"></div>
    <div id="textsList"></div>
    <div id="textInspector"></div>
    <div id="svgLayersList"></div>
    <div id="svgLayerInspector"></div>

    <button id="refreshFrameBtn"></button>
    <textarea id="frameOutput" spellcheck="false"></textarea>
  </div>

  <div id="presetsModal" class="presets-modal-overlay" hidden>
    <div class="presets-modal">
      <div class="modal-head">
        <span>Choose a Preset</span>
        <button id="presetsModalClose" class="btn">✕</button>
      </div>
      <div id="presetsGrid" class="presets-grid"></div>
    </div>
  </div>

  <div id="embedModal" class="presets-modal-overlay" hidden>
    <div class="presets-modal embed-modal">
      <div class="modal-head">
        <span>JSON Test & Export</span>
        <button id="embedModalClose" class="btn">✕</button>
      </div>
      <div class="embed-body">
        <label>Current Project JSON</label>
        <textarea id="embedJsonTextarea" class="embed-textarea" readonly></textarea>

        <div class="embed-row">
          <button id="embedCopyJsonBtn" class="btn">Copy JSON</button>
          <button id="embedExportJsonBtn" class="btn btn-accent">Export JSON</button>
          <button id="embedCopySnippetBtn" class="btn" hidden>Copy Snippet</button>
        </div>

        <label>Test Existing JSONs</label>
        <select id="embedPresetJsonSelect"></select>
        <textarea id="embedPresetJsonPreview" class="embed-textarea" readonly></textarea>
        <div class="embed-row">
          <button id="embedLoadPresetJsonBtn" class="btn" hidden>Load to Paste</button>
          <button id="embedApplyPresetJsonBtn" class="btn btn-accent">Apply Selected</button>
          <button id="embedExportTesterJsonBtn" class="btn" hidden>Export Tested JSON</button>
        </div>

        <label>Paste & Test</label>
        <textarea id="embedPasteJsonTextarea" class="embed-textarea" placeholder="Paste project JSON"></textarea>
        <button id="embedApplyJsonBtn" class="btn btn-accent">Apply Pasted JSON</button>
      </div>
    </div>
  </div>

  <footer class="stats-bar" hidden>
    <span id="fpsStat">FPS: —</span>
    <span id="renderStat">Render: — ms</span>
    <span id="cellsStat">Cells: —</span>
    <span id="layersStat">Layers: —</span>
    <span id="projectTitleLabel">ASCII Arter</span>
    <span id="statusStat">Ready</span>
  </footer>

  <script>
    const exportBtn = document.getElementById('exportMenuBtn');
    const exportDropdown = document.getElementById('exportDropdown');

    exportBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      exportDropdown.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!exportDropdown.contains(e.target) && e.target !== exportBtn) {
        exportDropdown.classList.remove('open');
      }
    });
  </script>

  <script type="module" src="./js/main.js?v=reboot-1"></script>
</body>
</html>
