<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASCII Arter — Image to ASCII Art Converter</title>
<style>
:root{--bg:#0d0d0d;--panel:#141414;--border:#222;--text:#ccc;--dim:#777;--accent:#5ec8ff;--accent2:#ff6b6b;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ---- HEADER ---- */
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.brand{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:#fff}
.brand span{color:var(--accent)}
.header-actions{display:flex;gap:8px;align-items:center}
/* ---- LAYOUT ---- */
main{display:flex;flex:1;overflow:hidden}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg)}
.canvas-area canvas{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated}
.drop-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.drop-zone.active{background:rgba(94,200,255,.08);border:2px dashed var(--accent);pointer-events:auto}
.drop-msg{text-align:center;color:var(--dim);font-size:15px;line-height:1.6;pointer-events:none}
.drop-msg b{color:var(--accent)}
/* ---- SIDEBAR ---- */
.sidebar{width:280px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:12px;display:flex;flex-direction:column;gap:12px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:2px}
/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);color:var(--text);cursor:pointer;font-size:13px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:#fff}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:11px}
/* ---- STYLE GRID ---- */
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.style-card{padding:8px 6px;border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:center;font-size:11px;transition:.15s;background:var(--bg)}
.style-card:hover{border-color:var(--accent)}
.style-card.active{border-color:var(--accent);background:rgba(94,200,255,.1)}
.style-card .ic{font-size:20px;display:block;margin-bottom:4px}
/* ---- CONTROLS ---- */
.ctrl-group{margin-bottom:8px}
.ctrl-group label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:3px}
.ctrl-group label span{color:var(--text);font-weight:600}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px}
.char-input{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;font-family:monospace}
/* ---- STATUS ---- */
.status-bar{padding:4px 16px;background:var(--panel);border-top:1px solid var(--border);font-size:11px;color:var(--dim);flex-shrink:0;display:flex;justify-content:space-between}
/* ---- RESPONSIVE ---- */
@media(max-width:768px){.sidebar{width:100%;border-left:none;border-top:1px solid var(--border);max-height:40vh}.canvas-area{min-height:60vh}main{flex-direction:column}}
</style>
</head>
<body>

<header>
  <div class="brand">ASCII <span>Arter</span></div>
  <div class="header-actions">
    <button class="btn btn-sm" id="uploadBtn">📁 Upload</button>
    <input type="file" id="fileInput" hidden accept="image/*,video/*">
    <button class="btn btn-sm" id="urlBtn">🔗 URL</button>
    <button class="btn btn-sm" id="pasteBtn">📋 Paste</button>
    <button class="btn btn-sm" id="demoBtn">🎲 Demo</button>
    <select id="exportFmt" style="width:auto;padding:4px 8px;font-size:11px">
      <option>PNG</option><option>JPG</option><option>GIF</option>
    </select>
    <button class="btn btn-primary btn-sm" id="exportBtn">⬇ Export</button>
  </div>
</header>

<main>
  <div class="canvas-area" id="canvasArea">
    <canvas id="preview"></canvas>
    <div class="drop-zone" id="dropZone">
      <div class="drop-msg">
        <b>Drop an image here</b><br>
        or click Upload · Paste · URL · Demo
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="section-label">Style</div>
    <div class="style-grid" id="styleGrid"></div>

    <div class="section-label">Parameters</div>
    <div class="ctrl-group"><label>Brightness <span id="brVal">1.0</span></label><input type="range" id="brightness" min="0" max="3" step="0.05" value="1"></div>
    <div class="ctrl-group"><label>Contrast <span id="ctVal">1.0</span></label><input type="range" id="contrast" min="0" max="4" step="0.05" value="1"></div>
    <div class="ctrl-group"><label>Resolution <span id="resVal">120</span></label><input type="range" id="resolution" min="20" max="300" step="5" value="120"></div>
    <div class="ctrl-group"><label>Invert</label><input type="checkbox" id="invert"></div>
    <div class="ctrl-group"><label>Character Ramp</label><input type="text" class="char-input" id="charRamp" value="@%#*+=-:. "></div>

    <div class="section-label">Background</div>
    <select id="bgMode">
      <option value="blur">Blurred Image</option>
      <option value="black">Solid Black</option>
      <option value="image">Original Image</option>
      <option value="none">Transparent</option>
    </select>

    <div class="section-label">Export</div>
    <div class="ctrl-group"><label>Font Size <span id="fsVal">10</span></label><input type="range" id="fontSize" min="6" max="24" step="1" value="10"></div>
  </aside>
</main>

<div class="status-bar">
  <span id="status">Ready — drop an image or click Demo</span>
  <span id="dimensions"></span>
</div>

<script>
// ═══════════ STATE ═══════════
const STYLES=[
  {id:'chars',name:'Characters',ic:'@'},
  {id:'blocks',name:'Block Chars',ic:'█'},
  {id:'pixel',name:'Pixel Art',ic:'▣'},
  {id:'dither',name:'Dither',ic:'▨'},
  {id:'dots',name:'Halftone',ic:'●'},
  {id:'mosaic',name:'Mosaic',ic:'⊞'},
  {id:'lego',name:'LEGO',ic:'◉'},
  {id:'glitch',name:'Glitch',ic:'⌇'},
];
let state={style:'chars',brightness:1,contrast:1,resolution:120,invert:false,charRamp:'@%#*+=-:. ',bgMode:'blur',fontSize:10};
let sourceImage=null,sourceVideo=null,isProcessing=false;

// ═══════════ DOM ═══════════
const $=id=>document.getElementById(id);
const preview=$('preview'),dropZone=$('dropZone'),canvasArea=$('canvasArea');
const ctx=preview.getContext('2d');

// ═══════════ STYLE GRID ═══════════
function buildStyleGrid(){
  let h='';
  for(const s of STYLES){
    h+=`<div class="style-card${state.style===s.id?' active':''}" data-style="${s.id}">
      <span class="ic">${s.ic}</span>${s.name}
    </div>`;
  }
  $('styleGrid').innerHTML=h;
}
buildStyleGrid();
$('styleGrid').addEventListener('click',e=>{
  const c=e.target.closest('.style-card');if(!c)return;
  state.style=c.dataset.style;
  document.querySelectorAll('.style-card').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  processImage();
});

// ═══════════ CONTROLS ═══════════
['brightness','contrast','resolution','fontSize'].forEach(id=>{
  $(id).addEventListener('input',()=>{
    state[id]=+$(id).value;
    $(id+'Val').textContent=$(id).value;
    if(id!=='fontSize')processImage();
  });
});
$('invert').addEventListener('change',()=>{state.invert=$('invert').checked;processImage()});
$('charRamp').addEventListener('input',()=>{state.charRamp=$('charRamp').value||' ';processImage()});
$('bgMode').addEventListener('change',()=>{state.bgMode=$('bgMode').value;processImage()});
$('exportFmt').addEventListener('change',()=>{});

// ═══════════ IMAGE LOADING ═══════════
function loadImage(src){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{sourceImage=img;sourceVideo=null;processImage();setStatus(`Loaded: ${img.naturalWidth}×${img.naturalHeight}`)};
  img.onerror=()=>setStatus('Failed to load image');
  img.src=src;
  $('dropZone').style.display='none';
}

$('uploadBtn').addEventListener('click',()=>$('fileInput').click());
$('fileInput').addEventListener('change',()=>{
  const f=$('fileInput').files[0];if(!f)return;
  if(f.type.startsWith('video/')){loadVideo(URL.createObjectURL(f));return}
  const r=new FileReader();r.onload=()=>loadImage(r.result);r.readAsDataURL(f);
});

$('urlBtn').addEventListener('click',()=>{
  const url=prompt('Image URL:');if(url)loadImage(url);
});

$('pasteBtn').addEventListener('click',async()=>{
  try{const items=await navigator.clipboard.read();for(const item of items){if(item.types.some(t=>t.startsWith('image/'))){const blob=await item.getType('image/png');loadImage(URL.createObjectURL(blob));return}}}catch(e){setStatus('No image in clipboard or permission denied')}
});

$('demoBtn').addEventListener('click',()=>{
  // Generate a colorful demo image
  const c=document.createElement('canvas');c.width=600;c.height=400;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,600,400);
  g.addColorStop(0,'#ff6b6b');g.addColorStop(0.25,'#ffd93d');g.addColorStop(0.5,'#6bcb77');g.addColorStop(0.75,'#4d96ff');g.addColorStop(1,'#9b59b6');
  x.fillStyle=g;x.fillRect(0,0,600,400);
  x.fillStyle='#fff';x.font='bold 80px sans-serif';x.textAlign='center';
  x.fillText('ASCII',300,180);x.font='60px sans-serif';x.fillText('ARTER',300,270);
  // Add some shapes
  x.beginPath();x.arc(100,100,50,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.3)';x.fill();
  x.beginPath();x.arc(500,300,60,0,Math.PI*2);x.fill();x.fillStyle='#fff';
  x.fillRect(450,50,40,40);x.fillRect(150,300,80,40);
  loadImage(c.toDataURL());
});

// Drag & drop
canvasArea.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('active')});
canvasArea.addEventListener('dragleave',()=>dropZone.classList.remove('active'));
canvasArea.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('active');
  const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>loadImage(r.result);r.readAsDataURL(f);
});

// ═══════════ CORE: PROCESS IMAGE ═══════════
function processImage(){
  if(!sourceImage||isProcessing)return;
  isProcessing=true;
  requestAnimationFrame(()=>{
    try{renderStyle(state.style)}catch(e){console.error(e);setStatus('Error: '+e.message)}
    isProcessing=false;
  });
}

function getScaledImageData(){
  const w=state.resolution;
  const h=Math.round(w*(sourceImage.height/sourceImage.width));
  const off=document.createElement('canvas');off.width=w;off.height=h;
  const octx=off.getContext('2d');
  octx.drawImage(sourceImage,0,0,w,h);
  return {data:octx.getImageData(0,0,w,h),width:w,height:h};
}

function applyBrightnessContrast(r,g,b){
  r=r/255*state.contrast+(state.brightness-1)*0.5;
  g=g/255*state.contrast+(state.brightness-1)*0.5;
  b=b/255*state.contrast+(state.brightness-1)*0.5;
  if(state.invert){r=1-r;g=1-g;b=1-b}
  return Math.max(0,Math.min(1,(r+g+b)/3));
}

function getChar(brightness){
  const ramp=state.charRamp||' ';
  return ramp[Math.floor(brightness*(ramp.length-1))]||ramp[ramp.length-1];
}

// ═══════════ STYLES ═══════════
function renderStyle(styleId){
  const {data,width,height}=getScaledImageData();
  const fs=state.fontSize;
  const charW=fs*0.6,charH=fs;
  const outW=width*charW,outH=height*charH;

  // Setup preview canvas
  preview.width=outW;preview.height=outH;
  ctx.clearRect(0,0,outW,outH);

  // Background
  if(state.bgMode==='black'){ctx.fillStyle='#000';ctx.fillRect(0,0,outW,outH)}
  else if(state.bgMode==='image'){ctx.drawImage(sourceImage,0,0,outW,outH)}
  else if(state.bgMode==='blur'){
    const bg=document.createElement('canvas');bg.width=outW;bg.height=outH;
    const bgx=bg.getContext('2d');bgx.filter='blur(20px)';bgx.drawImage(sourceImage,0,0,outW,outH);
    bgx.globalAlpha=0.9;bgx.fillStyle='#000';bgx.fillRect(0,0,outW,outH);
    ctx.drawImage(bg,0,0);
  }

  ctx.font=`${fs}px monospace`;
  ctx.textBaseline='top';

  const pixels=data.data;
  const renderer=RENDERERS[styleId]||RENDERERS.chars;
  renderer(pixels,width,height,fs,charW,charH);

  $('dimensions').textContent=`${outW}×${outH}`;
  setStatus(`Rendered: ${STYLES.find(s=>s.id===styleId)?.name||styleId} — ${width}×${height} chars`);
}

const RENDERERS={
  // Classic Characters
  chars(pixels,w,h,fs,cw,ch){
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const b=applyBrightnessContrast(pixels[i],pixels[i+1],pixels[i+2]);
        const c=getChar(b);
        const lum=Math.floor(b*255);
        ctx.fillStyle=`rgb(${lum},${lum},${lum})`;
        ctx.fillText(c,x*cw,y*ch);
      }
    }
  },

  // Block Characters (Unicode half/quarter blocks)
  blocks(pixels,w,h,fs,cw,ch){
    for(let y=0;y<h;y+=2){
      for(let x=0;x<w;x+=2){
        let tl=0,tr=0,bl=0,br=0;
        const getP=(px,py)=>{if(px>=w||py>=h)return 0;const j=((py)*w+px)*4;return applyBrightnessContrast(pixels[j],pixels[j+1],pixels[j+2])};
        tl=getP(x,y);tr=getP(x+1,y);bl=getP(x,y+1);br=getP(x+1,y+1);
        const avg=(tl+tr+bl+br)/4;
        let glyph=' ';const th=0.25;
        if(tl>th&&tr>th&&bl>th&&br>th)glyph='█';
        else if(tl>th&&tr>th&&bl<=th&&br<=th)glyph='▀';
        else if(tl<=th&&tr<=th&&bl>th&&br>th)glyph='▄';
        else if(tl>th&&tr<=th&&bl>th&&br<=th)glyph='▌';
        else if(tl<=th&&tr>th&&bl<=th&&br>th)glyph='▐';
        else if(tl>th&&tr<=th&&bl<=th&&br<=th)glyph='▘';
        else if(tl<=th&&tr>th&&bl<=th&&br<=th)glyph='▝';
        else if(tl<=th&&tr<=th&&bl>th&&br<=th)glyph='▖';
        else if(tl<=th&&tr<=th&&bl<=th&&br>th)glyph='▗';
        const lum=Math.floor(avg*255);
        ctx.fillStyle=`rgb(${lum},${lum},${lum})`;
        ctx.fillText(glyph,x*cw,y*ch);
      }
    }
  },

  // Pixel Art
  pixel(pixels,w,h,fs,cw,ch){
    const blockW=cw*2,blockH=ch*2;
    for(let y=0;y<h;y+=2){
      for(let x=0;x<w;x+=2){
        let sr=0,sg=0,sb=0,n=0;
        for(let dy=0;dy<2&&y+dy<h;dy++)for(let dx=0;dx<2&&x+dx<w;dx++){
          const j=((y+dy)*w+(x+dx))*4;
          sr+=pixels[j];sg+=pixels[j+1];sb+=pixels[j+2];n++;
        }
        const b=applyBrightnessContrast(sr/n,sg/n,sb/n);
        const r=Math.floor((sr/n)*0.8),g=Math.floor((sg/n)*0.8),bl=Math.floor((sb/n)*0.8);
        ctx.fillStyle=`rgb(${r},${g},${bl})`;
        ctx.fillRect(x*cw,y*ch,blockW-1,blockH-1);
      }
    }
    // Grid lines
    ctx.strokeStyle='rgba(0,0,0,0.15)';
    ctx.lineWidth=1;
    for(let y=0;y<h;y+=2)for(let x=0;x<w;x+=2){
      ctx.strokeRect(x*cw,y*ch,blockW,blockH);
    }
  },

  // Dither (Floyd-Steinberg simplified)
  dither(pixels,w,h,fs,cw,ch){
    const gray=new Float32Array(w*h);
    for(let i=0;i<w*h;i++)gray[i]=applyBrightnessContrast(pixels[i*4],pixels[i*4+1],pixels[i*4+2]);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const idx=y*w+x;
        const old=gray[idx];
        const nv=old>0.5?1:0;
        const err=(old-nv)/16;
        if(x+1<w)gray[idx+1]+=err*7;
        if(y+1<h){
          if(x>0)gray[idx+w-1]+=err*3;
          gray[idx+w]+=err*5;
          if(x+1<w)gray[idx+w+1]+=err*1;
        }
        const col=nv*255;
        ctx.fillStyle=`rgb(${col},${col},${col})`;
        ctx.fillText(nv?'█':' ',x*cw,y*ch);
      }
    }
  },

  // Halftone Dots
  dots(pixels,w,h,fs,cw,ch){
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const b=applyBrightnessContrast(pixels[i],pixels[i+1],pixels[i+2]);
        const r=b*cw*0.7;
        const cx=x*cw+cw/2,cy=y*ch+ch/2;
        const lum=Math.floor(b*255);
        ctx.fillStyle=`rgb(${lum},${lum},${lum})`;
        ctx.beginPath();
        ctx.arc(cx,cy,Math.max(0.5,r),0,Math.PI*2);
        ctx.fill();
      }
    }
  },

  // Mosaic
  mosaic(pixels,w,h,fs,cw,ch){
    const bs=Math.max(2,Math.floor(cw/2))*2;
    for(let y=0;y<h;y+=bs/ch*2){
      for(let x=0;x<w;x+=bs/cw*2){
        let sr=0,sg=0,sb=0,n=0;
        const bx=Math.floor(x),by=Math.floor(y);
        const bw=Math.max(1,Math.floor(bs/cw)),bh=Math.max(1,Math.floor(bs/ch));
        for(let dy=0;dy<bh&&by+dy<h;dy++)for(let dx=0;dx<bw&&bx+dx<w;dx++){
          const j=((by+dy)*w+(bx+dx))*4;
          sr+=pixels[j];sg+=pixels[j+1];sb+=pixels[j+2];n++;
        }
        ctx.fillStyle=`rgb(${Math.floor(sr/n)},${Math.floor(sg/n)},${Math.floor(sb/n)})`;
        ctx.fillRect(bx*cw,by*ch,bw*cw,bh*ch);
      }
    }
  },

  // LEGO Bricks
  lego(pixels,w,h,fs,cw,ch){
    const bs=Math.max(3,Math.floor(cw));
    for(let y=0;y<h;y+=bs/ch*2){
      for(let x=0;x<w;x+=bs/cw*2){
        let sr=0,sg=0,sb=0,n=0;
        const bx=Math.floor(x),by=Math.floor(y);
        const bw=Math.max(1,Math.floor(bs/cw)),bh=Math.max(1,Math.floor(bs/ch));
        for(let dy=0;dy<bh&&by+dy<h;dy++)for(let dx=0;dx<bw&&bx+dx<w;dx++){
          const j=((by+dy)*w+(bx+dx))*4;
          sr+=pixels[j];sg+=pixels[j+1];sb+=pixels[j+2];n++;
        }
        const px=bx*cw,py=by*ch,pw=bw*cw-2,ph=bh*ch-2;
        // Brick body
        ctx.fillStyle=`rgb(${Math.floor(sr/n)},${Math.floor(sg/n)},${Math.floor(sb/n)})`;
        ctx.fillRect(px+1,py+1,pw,ph);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.fillRect(px+2,py+2,pw*0.4,ph*0.4);
        // Shadow
        ctx.fillStyle='rgba(0,0,0,0.2)';
        ctx.fillRect(px+1,py+ph-2,pw,2);
        ctx.fillRect(px+pw-2,py+1,2,ph);
        // Stud
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.beginPath();ctx.arc(px+pw/2,py+ph/2,Math.min(pw,ph)*0.2,0,Math.PI*2);ctx.fill();
      }
    }
  },

  // Glitch
  glitch(pixels,w,h,fs,cw,ch){
    // First render normal chars
    RENDERERS.chars(pixels,w,h,fs,cw,ch);
    // Then apply glitch slices
    const imgData=ctx.getImageData(0,0,preview.width,preview.height);
    for(let s=0;s<8;s++){
      const sy=Math.floor(Math.random()*preview.height);
      const sh=Math.floor(Math.random()*preview.height*0.15)+2;
      const dx=Math.floor((Math.random()-0.5)*preview.width*0.3);
      ctx.putImageData(imgData,dx,sy,0,sy,preview.width,sh);
    }
    // RGB split on some rows
    for(let s=0;s<3;s++){
      const sy=Math.floor(Math.random()*preview.height);
      const slice=ctx.getImageData(0,sy,preview.width,1);
      for(let px=0;px<slice.data.length;px+=4){
        const shift=Math.floor(Math.random()*8-4);
        if(px+shift*4>=0&&px+shift*4<slice.data.length)slice.data[px]=slice.data[px+shift*4]||slice.data[px];
      }
      ctx.putImageData(slice,0,sy);
    }
  }
};

// ═══════════ VIDEO ═══════════
function loadVideo(src){
  const v=document.createElement('video');v.src=src;v.crossOrigin='anonymous';v.muted=true;v.playsInline=true;
  v.onloadedmetadata=()=>{
    v.currentTime=0.1;
    v.onseeked=()=>{
      const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
      c.getContext('2d').drawImage(v,0,0);
      sourceImage=c;sourceVideo=v;
      processImage();
      $('dropZone').style.display='none';
      setStatus(`Video loaded: ${v.videoWidth}×${v.videoHeight}`);
    };
  };
  v.onerror=()=>setStatus('Failed to load video');
}

// ═══════════ EXPORT ═══════════
$('exportBtn').addEventListener('click',()=>{
  if(!sourceImage){setStatus('Load an image first');return}
  const fmt=$('exportFmt').value;
  if(fmt==='PNG'){
    const a=document.createElement('a');
    a.download='ascii-arter.png';a.href=preview.toDataURL('image/png');
    a.click();setStatus('PNG exported!');
  }else if(fmt==='JPG'){
    const a=document.createElement('a');
    a.download='ascii-arter.jpg';a.href=preview.toDataURL('image/jpeg',0.92);
    a.click();setStatus('JPG exported!');
  }else if(fmt==='GIF'){
    exportGIF();
  }
});

// ═══════════ GIF EXPORT (simple frame sequence) ═══════════
function exportGIF(){
  // For now export single frame as GIF-like PNG
  const a=document.createElement('a');
  a.download='ascii-arter.gif';
  a.href=preview.toDataURL('image/png');
  a.click();
  setStatus('GIF export (single frame) — full animation coming soon!');
}

// ═══════════ UTILS ═══════════
function setStatus(msg){$('status').textContent=msg}
</script>
