<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Arter</title>
  <meta name="description" content="Pure JavaScript ASCII art animation creator." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <div id="appShell">

    <!-- ── TOP BAR ── -->
    <header class="topbar">
      <span class="logo">ASCII Arter</span>
      <div class="topbar-center">
        <button id="playPauseBtn" class="btn btn-primary">⏸ Pause</button>
        <button id="randomizeBtn" class="btn">🎲 Randomize</button>
        <button id="shuffleCharsetBtn" class="btn">🔀 Charset</button>
      </div>
      <div class="topbar-right">
        <select id="presetSelect" class="select-compact" hidden></select>
        <button id="presetsGalleryBtn" class="btn">🎨 Presets</button>
        <button id="savePresetBtn" class="btn btn-ghost">💾 Save</button>
        <div class="export-group">
          <button class="btn btn-ghost" id="exportMenuBtn">⬇ Export ▾</button>
          <div class="dropdown" id="exportDropdown">
            <button id="copyFrameBtn">📋 Copy Frame</button>
            <button id="exportTxtBtn">📄 TXT</button>
            <button id="exportPngBtn">🖼 PNG</button>
            <button id="exportHtmlBtn">🌐 HTML</button>
            <button id="exportProjectBtn">📦 JSON Project</button>
            <button id="importBtn">📂 Import JSON</button>
          </div>
        </div>
        <input id="importProjectInput" type="file" accept="application/json" hidden />
      </div>
    </header>

    <!-- ── INPUT DOCK (always visible) ── -->
    <div class="input-dock">

      <div class="input-dock-cell">
        <label class="input-dock-label">✏️ Text</label>
        <textarea id="subjectTextInput" class="input-dock-textarea" placeholder="Type here — becomes the canvas subject" rows="2" spellcheck="false"></textarea>
        <div class="input-dock-row">
          <select id="subjectFontWeight" class="select-compact">
            <option value="bold">Bold</option>
            <option value="900">Extra Bold</option>
            <option value="normal">Normal</option>
          </select>
          <button class="subject-tab active" data-type="text" id="activateTextBtn">Use Text</button>
        </div>
      </div>

      <div class="input-dock-divider"></div>

      <div class="input-dock-cell">
        <label class="input-dock-label">◈ SVG</label>
        <textarea id="subjectSvgInput" class="input-dock-textarea" placeholder="Paste <svg>...</svg> here" rows="2" spellcheck="false"></textarea>
        <div class="input-dock-row">
          <button class="btn btn-ghost btn-sm" id="subjectSvgUpload">📁 Upload</button>
          <input id="subjectSvgFileInput" type="file" accept=".svg,image/svg+xml" hidden />
          <button class="subject-tab" data-type="svg" id="activateSvgBtn">Use SVG</button>
        </div>
      </div>

      <div class="input-dock-divider"></div>

      <div class="input-dock-cell input-dock-options">
        <label class="input-dock-label">⚙ Options</label>
        <label class="input-dock-option-row">
          <span>BG</span>
          <input type="range" id="subjectBgIntensity" min="0" max="0.5" step="0.01" value="0.08" />
        </label>
        <label class="input-dock-option-row">
          <span>Pad</span>
          <input type="range" id="subjectPadding" min="0" max="12" step="1" value="4" />
        </label>
        <button class="btn btn-ghost btn-sm" id="subjectClearBtn" style="margin-top:4px">✕ Clear</button>
      </div>

    </div>

    <!-- ── MAIN STAGE ── -->
    <div class="stage-area">

      <!-- Canvas fills the stage -->
      <div class="canvas-wrap">
        <canvas id="stageCanvas" aria-label="ASCII preview canvas"></canvas>
      </div>

      <!-- ── LEFT PANEL: Controls ── -->
      <div class="float-panel float-panel-left" id="controlsPanel">
        <div class="panel-header">
          <span>Controls</span>
          <button class="panel-close" data-panel="controlsPanel" title="Close">✕</button>
        </div>
        <div class="panel-body">
          <div id="controlsContent"></div>
        </div>
      </div>
      <button class="panel-tab panel-tab-left" id="controlsTab" data-panel="controlsPanel" title="Open Controls">
        ◀ Controls
      </button>

      <!-- ── RIGHT PANEL: Layers ── -->
      <div class="float-panel float-panel-right" id="layersPanel">
        <div class="panel-header">
          <span>Layers</span>
          <button class="panel-close" data-panel="layersPanel" title="Close">✕</button>
        </div>
        <div class="panel-body">

          <!-- ✏️ Your Content moved to input-dock (always visible below topbar) -->

          <!-- Animation Layers -->
          <details open>
            <summary>
              <span>Animation Layers</span>
              <span class="summary-actions" onclick="event.stopPropagation()">
                <button id="moveLayerUpBtn" class="icon-btn" title="Move Up">↑</button>
                <button id="moveLayerDownBtn" class="icon-btn" title="Move Down">↓</button>
                <button id="duplicateLayerBtn" class="icon-btn" title="Duplicate">⎘</button>
                <button id="removeLayerBtn" class="icon-btn danger" title="Remove">−</button>
                <button id="addLayerBtn" class="icon-btn primary" title="Add">＋</button>
              </span>
            </summary>
            <div id="layersList" class="list-stack"></div>
            <div id="layerInspector" class="inspector"></div>
          </details>

          <!-- Text Layers -->
          <details>
            <summary>
              <span>Text Layers</span>
              <span class="summary-actions" onclick="event.stopPropagation()">
                <button id="duplicateTextBtn" class="icon-btn" title="Duplicate">⎘</button>
                <button id="removeTextBtn" class="icon-btn danger" title="Remove">−</button>
                <button id="addTextBtn" class="icon-btn primary" title="Add">＋</button>
              </span>
            </summary>
            <div id="textsList" class="list-stack"></div>
            <div id="textInspector" class="inspector"></div>
          </details>

          <!-- SVG Layers -->
          <details id="svgLayersSection">
            <summary>
              <span>SVG Layers</span>
              <span class="summary-actions" onclick="event.stopPropagation()">
                <button id="removeSvgLayerBtn" class="icon-btn danger" title="Remove">−</button>
                <button id="addSvgLayerBtn" class="icon-btn primary" title="Add SVG Layer">＋</button>
              </span>
            </summary>
            <div id="svgLayersList" class="list-stack"></div>
            <label class="upload-svg-label">
              <input id="svgUploadInput" type="file" accept=".svg,image/svg+xml" hidden />
              <button class="btn btn-ghost btn-sm" onclick="document.getElementById('svgUploadInput').click()">📁 Upload SVG</button>
            </label>
            <div id="svgLayerInspector" class="inspector"></div>
          </details>

          <!-- ASCII Snapshot (rarely used) -->
          <details>
            <summary>ASCII Snapshot</summary>
            <div class="snapshot-bar">
              <button id="refreshFrameBtn" class="btn btn-ghost btn-sm">↻ Refresh</button>
            </div>
            <textarea id="frameOutput" spellcheck="false" aria-label="ASCII frame output"></textarea>
          </details>

        </div>
      </div>
      <button class="panel-tab panel-tab-right" id="layersTab" data-panel="layersPanel" title="Open Layers">
        Layers ▶
      </button>

    </div><!-- /stage-area -->

    <!-- ── PRESETS MODAL ── -->
    <div id="presetsModal" class="presets-modal-overlay" hidden>
      <div class="presets-modal">
        <div class="presets-modal-header">
          <span class="presets-modal-title">🎨 Choose a Preset</span>
          <button id="presetsModalClose" class="panel-close" title="Close">✕</button>
        </div>
        <div id="presetsGrid" class="presets-grid"></div>
      </div>
    </div>

    <!-- ── BOTTOM STATS BAR ── -->
    <footer class="stats-bar">
      <span id="fpsStat">FPS: —</span>
      <span id="renderStat">Render: — ms</span>
      <span id="cellsStat">Cells: —</span>
      <span id="layersStat">Layers: —</span>
      <span id="projectTitleLabel" class="stats-title">ASCII Arter</span>
      <span id="statusStat" class="stats-status">Ready</span>
    </footer>

  </div><!-- /appShell -->

  <script>
    // Panel toggle logic
    function togglePanel(panelId) {
      const panel = document.getElementById(panelId);
      const isLeft = panel.classList.contains('float-panel-left');
      const tabId = isLeft ? 'controlsTab' : 'layersTab';
      const tab = document.getElementById(tabId);
      const open = panel.classList.toggle('panel-open');
      tab.style.display = open ? 'none' : '';
    }

    document.querySelectorAll('.panel-close, .panel-tab').forEach(btn => {
      btn.addEventListener('click', () => togglePanel(btn.dataset.panel));
    });

    // Input dock activate buttons — visual feedback (JS logic is in main.js)
    document.getElementById('activateTextBtn').addEventListener('click', () => {
      document.getElementById('activateTextBtn').classList.add('active');
      document.getElementById('activateSvgBtn').classList.remove('active');
    });
    document.getElementById('activateSvgBtn').addEventListener('click', () => {
      document.getElementById('activateSvgBtn').classList.add('active');
      document.getElementById('activateTextBtn').classList.remove('active');
    });

    // Export dropdown
    const exportBtn = document.getElementById('exportMenuBtn');
    const exportDropdown = document.getElementById('exportDropdown');
    exportBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      exportDropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => exportDropdown.classList.remove('open'));
  </script>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
